name: lock

on:
  push:
    branches:
      - master
      - stable
  pull_request:
    branches:
      - master
      - stable

jobs:
  lock_test:
    name: Lock plugin (Go ${{ matrix.go }}, PHP ${{ matrix.php }}, OS ${{matrix.os}})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      matrix:
        php: [ "8.5" ]
        go: [ "stable" ]
        os: [ "ubuntu-latest" ]
    steps:
      - name: Set up Go ${{ matrix.go }}
        uses: actions/setup-go@v6 # action page: <https://github.com/actions/setup-go>
        with:
          go-version: ${{ matrix.go }}

      - name: Check out code
        uses: actions/checkout@v7

      - name: Init Go modules Cache # Docs: <https://git.io/JfAKn#go---modules>
        uses: actions/cache@v5
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Install Go dependencies
        run: go mod download

      - name: Run golang tests with coverage
        run: |
          cd tests
          mkdir ./coverage-ci

          go test -timeout 20m -v -race -cover -tags=debug -failfast -coverpkg=github.com/roadrunner-server/lock/v6 -coverprofile=./coverage-ci/lock.out -covermode=atomic lock_test.go rpc.go

      - name: Archive code coverage results
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: ./tests/coverage-ci/lock.out

  codecov:
    name: Upload codecov
    runs-on: ubuntu-latest
    needs:
      - lock_test

    timeout-minutes: 60
    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Download code coverage results
        uses: actions/download-artifact@v8
        with:
          name: coverage
          path: coverage
      - run: |
          echo 'mode: atomic' > summary.txt
          tail -q -n +2 coverage/*.out >> summary.txt
          awk '
            NR == 1 { print; next }
            /^github\.com\/roadrunner-server\/lock\/v6\// {
              sub(/^github\.com\/roadrunner-server\/lock\/v6\//, "", $0)
              print
            }
          ' summary.txt > summary.filtered.txt
          mv summary.filtered.txt summary.txt

      - name: upload to codecov
        uses: codecov/codecov-action@v7 # Docs: <https://github.com/codecov/codecov-action>
        with:
          files: summary.txt
          fail_ci_if_error: false
